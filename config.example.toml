[database]
riko = "postgresql://riko:zxz456123@127.0.0.1:5632/mem_riko"
herm = "postgresql://herm:zxz456123@127.0.0.1:5632/mem_herm"
doge = "postgresql://doge:zxz456123@127.0.0.1:5632/mem_doge"
share = "postgresql://share:zxz456123@127.0.0.1:5632/mem_share"
hakimi = "postgresql://hakimi:zxz456123@127.0.0.1:5632/mem_hakimi"
claw = "postgresql://claw:zxz456123@127.0.0.1:5632/mem_claw"

[categories]
index_list = ["core", "book", "myhome", "user", "init"]

[search]
# 搜索运行参数：先保留开关用于早期调试；关键词和全文后续可能固定为后端基础能力。
default_limit = 8 # 默认返回条数。
graph_expand_depth = 1 # 图扩展深度；第一版只允许一跳，避免召回发散。
# 临时调参区：先保留给早期搜索实验，召回策略稳定后可以收回到后端代码里固定。
keyword = 40 # 关键词精确命中加分，负责专名、术语、别名。
fulltext = 25 # title/summary/content/keywords 的全文检索加分。
semantic = 20 # 语义向量相似度加分，负责非字面但语义接近的召回。
graph = 12 # 关系图一跳扩展加分，负责补充强关联记忆。
stale_penalty = 10 # 过期或需要复审的记忆扣分。

[rerank]
enabled = false # 是否启用 rerank 模型重排；关闭时只按基础召回分排序。
rerank_api = "local" # local 表示本地 rerank；否则填写 rerank API base URL 或完整 endpoint。
rerank_api_type = "rerank"
rerank_model = "Qwen/Qwen3-Reranker-4B"
rerank_key = "" # rerank_api = local 时可为空。

[embeddings]
# local 表示本地 embedding；否则填写 embedding API base URL 或完整 endpoint。
embeddings_api = "local"
embeddings_api_type = "embeddings"
embeddings_model = "BAAI/bge-m3"
embeddings_dimension = 1024
embeddings_key = "" # embeddings_api = local 时可为空。

[network]
enable_proxy = false # true 时才使用下面的 proxy。
proxy = "socks5://127.0.0.1:12828" # 可选；也支持 "http://127.0.0.1:12828"。

[auth.turnstile]
enabled = false # 只保护 /auth init 授权页；生产开启后必须配置 secret_key。
site_key = "0x4AAAAAADXWPWveDjEIZ8XK"
secret_key = "" # 真实 Turnstile secret 只写入本地 config.toml，不提交仓库。
verify_url = "https://challenges.cloudflare.com/turnstile/v0/siteverify"

[debug]
# true 会在 CLI 启动时清空 profile/share 记忆表并重新建表，只能在本地调试打开。
reset_db = false

[server]
addr = "0.0.0.0:37777"
api_token = "xxx"
